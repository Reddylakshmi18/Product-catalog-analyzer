<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Product Catalog Analyzer</h1>

    <div class="card">

        <img id="productImage" src="images/mouse.jpg" alt="Mouse" title="Product Image">

        <h2 id="product1">Wireless Mouse</h2>

        <h3 class="price">₹499</h3>

        <p class="description">
            Comfortable wireless mouse for daily use.
        </p>

        <button>Buy Now</button>

    </div>

    <div class="card">
        <img id="productImage" src="images/keyboard.jpg" alt="keyboard" title="Product Image">

        <h2 id="product1">Keyboard</h2>

        <h3 class="price">₹899</h3>

        <p class="description">
            Comfortable wireless keyboard to type smoothly.
        </p>

        <button>Buy Now</button>
    </div>

    <div class="card"><img id="productImage" src="images/headphones.jpg" alt="headphones" title="Product Image">

        <h2 id="product1">Headphones</h2>

        <h3 class="price">₹799</h3>

        <button>Buy Now</button>
    </div>

    <button onclick="performDOMOperations()">
        Perform DOM Operations
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
